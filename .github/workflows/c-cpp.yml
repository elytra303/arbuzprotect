name: C/C++ Windows Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64

    - name: Compile to EXE
      # Ищет все .cpp файлы в проекте и компилирует их в program.exe
      run: |
        x86_64-w64-mingw32-g++ -O3 *.cpp -o program.exe -static -static-libgcc -static-libstdc++

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-program
        path: program.exe
