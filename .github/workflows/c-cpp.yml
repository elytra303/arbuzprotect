name: C/C++ Windows Build (Cross-Compile)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install MinGW compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64

    - name: Configure for Windows
      # Передаем хост-систему mingw, чтобы скрипт configure понял, что мы собираем под Windows
      run: ./configure --host=x86_64-w64-mingw32

    - name: Build EXE
      # Указываем компиляторы MinGW для сборки
      run: make CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-executable
        # Укажи здесь правильный путь к твоему готовому .exe файлу
        path: "**/*.exe"
